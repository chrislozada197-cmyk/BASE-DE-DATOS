<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Documentos</title>
</head>
<body>
    <h1>Subir archivo</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <!-- Permite cualquier tipo de archivo -->
        <input type="file" name="file" accept="*/*" required>
        <!-- Campo opcional de palabras clave -->
        <input type="text" name="keywords" placeholder="Palabras clave (opcional)">
        <input type="submit" value="Subir">
    </form>

    <h1>Buscar archivo</h1>
    <form action="/buscar" method="get">
        <input type="text" name="q" placeholder="Nombre o palabra clave" required>
        <input type="submit" value="Buscar">
    </form>
</body>
</html>
